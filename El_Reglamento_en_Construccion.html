<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>El Reglamento en Construcción</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --turquesa:#00B4D8; --turquesa-dark:#0088A8; --dorado:#F4A100; --dorado-dark:#C97F00;
    --crema:#FFF8EC; --navy:#1B3A5C; --verde:#3FBF7F; --coral:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:
      radial-gradient(circle at 15% 20%, rgba(244,161,0,0.13), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0,180,216,0.15), transparent 45%),
      var(--crema);
    font-family:'Nunito',sans-serif;color:var(--navy);display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;}
  .wrap{width:100%;max-width:600px;}
  header{text-align:center;margin-bottom:14px;}
  .eyebrow{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dorado-dark);margin:0 0 4px;}
  h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(20px,5.5vw,28px);margin:0 0 6px;color:var(--navy);}
  .levelbar{display:flex;gap:5px;margin:14px 0;justify-content:center;flex-wrap:wrap;}
  .dot{width:20px;height:20px;border-radius:50%;background:#fff;border:2.5px solid #E6DDCC;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#bbb;transition:.3s;}
  .dot.done{background:var(--verde);border-color:var(--verde);color:#fff;}
  .dot.current{border-color:var(--turquesa);color:var(--turquesa-dark);transform:scale(1.2);}
  .card{background:#fff;border-radius:20px;padding:22px 20px;box-shadow:0 8px 24px rgba(27,58,92,.10);border:2px solid #F0E6D2;}
  .tag{display:inline-block;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:var(--turquesa);border-radius:999px;padding:4px 12px;margin-bottom:10px;}
  .tag.concision{background:var(--dorado-dark);}
  .tag.orden{background:var(--coral);}
  .prompt{font-size:15.5px;font-weight:700;color:var(--navy);margin-bottom:14px;line-height:1.4;background:#FBF3E4;border-radius:12px;padding:12px 14px;}
  .opt{display:block;width:100%;text-align:left;background:#FBF9F4;border:2px solid #EDE3CC;border-radius:14px;padding:12px 14px;margin-bottom:9px;font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:700;color:var(--navy);cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--turquesa);}
  .opt.correct{background:#F1FBF6;border-color:var(--verde);color:#1c6b45;}
  .opt.wrong{background:#FFF1F1;border-color:var(--coral);color:#a83a3a;}
  .opt:disabled{cursor:default;}
  .fragbox{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;min-height:50px;padding:10px;background:#FBF9F4;border-radius:12px;border:2px dashed #EDE3CC;}
  .frag{background:var(--turquesa);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;border-radius:10px;padding:9px 13px;cursor:pointer;user-select:none;transition:.15s;}
  .frag:hover{background:var(--turquesa-dark);}
  .frag.placed{background:#ccc;cursor:default;opacity:.4;}
  .answerline{min-height:44px;background:#fff;border:2px solid var(--navy);border-radius:12px;padding:8px 10px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .answerline .frag2{background:var(--dorado);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;border-radius:8px;padding:7px 11px;}
  .explain{display:none;margin-top:12px;padding:12px 14px;background:#FFF8EC;border-left:4px solid var(--dorado);border-radius:8px;font-size:13px;line-height:1.5;}
  .explain.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .btn{margin-top:14px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;background:linear-gradient(145deg,var(--turquesa),var(--turquesa-dark));color:#fff;border:none;border-radius:999px;padding:10px 24px;cursor:pointer;box-shadow:0 4px 0 var(--turquesa-dark);display:none;}
  .btn.show{display:inline-block;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--turquesa-dark);}
  .btn:disabled{opacity:.4;cursor:default;}
  .result{display:none;text-align:center;}
  .result.show{display:block;animation:rise .4s ease;}
  .result h2{font-family:'Baloo 2',sans-serif;color:var(--dorado-dark);font-size:24px;margin-bottom:6px;}
  .score{font-family:'Baloo 2',sans-serif;font-size:40px;font-weight:800;color:var(--turquesa-dark);margin:10px 0;}
  footer{margin-top:20px;text-align:center;font-size:11px;color:#9AA7B3;font-weight:700;}
  footer b{color:var(--turquesa-dark);}
</style></head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">6° Primaria · Proyecto 1</p>
    <h1>📜 El Reglamento en Construcción</h1>
  </header>
  <div class="levelbar" id="levelbar"></div>
  <div class="card" id="card"></div>
  <div class="result" id="result">
    <h2>🏆 ¡Reglamento terminado!</h2>
    <div class="score" id="scoreText"></div>
    <p id="resultMsg"></p>
    <button class="btn show" onclick="start()">Jugar de nuevo</button>
  </div>
  <footer>2026-2027 · <b>EnciendeIA</b> · Planeación 6° Primaria</footer>
</div>
<script>
const DATA = {"verbo": [{"mal": "Los alumnos guardarán silencio cuando alguien hablaba.", "opciones": ["Guardar silencio cuando alguien habla.", "Guardando silencio cuando alguien hable.", "Guardaron silencio cuando alguien hablará."], "correcta": 0}, {"mal": "Se debería de respetar el turno de participación de todos.", "opciones": ["Respetar el turno de participación de todos.", "Respetando el turno de participación de todos.", "Se respetaba el turno de participación."], "correcta": 0}, {"mal": "Los materiales serán cuidados por todos los alumnos siempre.", "opciones": ["Cuidando los materiales del salón entre todos.", "Cuidar los materiales del salón entre todos.", "Los materiales cuidaban entre todos."], "correcta": 1}], "concision": [{"largo": "Es muy importante y necesario que todos y cada uno de los alumnos del salón mantengan limpio y ordenado su espacio de trabajo todos los días sin excepción.", "opciones": ["Mantener limpio el espacio de trabajo cada día.", "Es importante que se mantenga limpio, ordenado y cuidado el espacio de trabajo de cada alumno todos los días de la semana sin ninguna excepción.", "El espacio de trabajo debe estar limpio y también ordenado todos los días porque es muy importante para el salón."], "correcta": 0}, {"largo": "Cuando un compañero o compañera está hablando y participando en clase, es necesario que el resto del grupo escuche con atención y respeto sin interrumpir en ningún momento.", "opciones": ["Es necesario que cuando alguien habla, todos escuchen con atención y respeto durante el tiempo que dure su participación sin interrumpir.", "Escuchar con respeto cuando un compañero participa.", "El grupo debe de escuchar y prestar atención cuando alguien más está participando y hablando en la clase."], "correcta": 1}, {"largo": "Todos los alumnos del grupo tienen la responsabilidad de levantar la mano antes de hablar para pedir su turno de participación en cualquier momento de la clase.", "opciones": ["Los alumnos deben de levantar la mano cada vez que quieran hablar en cualquier momento durante la clase para poder participar.", "Levantar la mano para pedir la palabra.", "Es responsabilidad de todos levantar la mano antes de participar en la clase en todo momento."], "correcta": 1}], "orden": [{"fragmentos": ["Guardar silencio", "cuando alguien", "esté hablando."], "orden_correcto": [0, 1, 2]}, {"fragmentos": ["Pedir la palabra", "levantando la mano", "antes de hablar."], "orden_correcto": [0, 1, 2]}, {"fragmentos": ["Cuidar el material", "del salón", "entre todos."], "orden_correcto": [0, 1, 2]}]};

// Construir la secuencia de retos: verbo(3) -> concision(3) -> orden(3)
const CHALLENGES = [];
DATA.verbo.forEach(r => CHALLENGES.push({type:'verbo', data:r}));
DATA.concision.forEach(r => CHALLENGES.push({type:'concision', data:r}));
DATA.orden.forEach(r => CHALLENGES.push({type:'orden', data:r}));

let current = 0, score = 0, answered = false;
let ordenState = null;

function buildLevelbar(){
  const p = document.getElementById('levelbar');
  p.innerHTML = '';
  CHALLENGES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i===current ? ' current' : '') + (i<current ? ' done' : '');
    d.textContent = i+1;
    p.appendChild(d);
  });
}

function render(){
  answered = false;
  document.getElementById('result').classList.remove('show');
  document.getElementById('card').style.display = 'block';
  const ch = CHALLENGES[current];
  const card = document.getElementById('card');
  buildLevelbar();

  if(ch.type === 'verbo'){
    card.innerHTML = `
      <span class="tag">Corrige el verbo</span>
      <div class="prompt">"${ch.data.mal}"<br><small>¿Cuál es la forma correcta para un reglamento?</small></div>
      <div id="opts"></div>
      <div class="explain" id="explain">Un reglamento usa verbos en infinitivo o presente, breves y directos — no futuro ni pasado.</div>
      <button class="btn" id="nextBtn" onclick="next()">${current === CHALLENGES.length-1 ? 'Ver resultado' : 'Siguiente'}</button>
    `;
    const optsDiv = document.getElementById('opts');
    ch.data.opciones.forEach((opt, idx) => {
      const b = document.createElement('button');
      b.className = 'opt'; b.textContent = opt;
      b.onclick = () => selectOption(idx, ch.data.correcta);
      optsDiv.appendChild(b);
    });
  } else if(ch.type === 'concision'){
    card.innerHTML = `
      <span class="tag concision">Elige la más concisa</span>
      <div class="prompt">"${ch.data.largo}"<br><small>¿Cuál dice lo mismo de forma breve y clara?</small></div>
      <div id="opts"></div>
      <div class="explain" id="explain">Un reglamento usa oraciones breves — misma idea, menos palabras.</div>
      <button class="btn" id="nextBtn" onclick="next()">${current === CHALLENGES.length-1 ? 'Ver resultado' : 'Siguiente'}</button>
    `;
    const optsDiv = document.getElementById('opts');
    ch.data.opciones.forEach((opt, idx) => {
      const b = document.createElement('button');
      b.className = 'opt'; b.textContent = opt;
      b.onclick = () => selectOption(idx, ch.data.correcta);
      optsDiv.appendChild(b);
    });
  } else if(ch.type === 'orden'){
    ordenState = { placed: [], remaining: ch.data.fragmentos.map((f,i)=>({text:f, idx:i})) };
    card.innerHTML = `
      <span class="tag orden">Ordena la regla</span>
      <div class="prompt">Toca los fragmentos en el orden correcto para formar la regla.</div>
      <div class="answerline" id="answerline"></div>
      <div class="fragbox" id="fragbox"></div>
      <div class="explain" id="explain">Las reglas se organizan de la acción principal al detalle, con orden lógico y claro.</div>
      <button class="btn" id="checkBtn" onclick="checkOrden()">Comprobar</button>
      <button class="btn" id="nextBtn" onclick="next()">${current === CHALLENGES.length-1 ? 'Ver resultado' : 'Siguiente'}</button>
    `;
    document.getElementById('checkBtn').classList.add('show');
    renderFragBox();
  }
}

function renderFragBox(){
  const box = document.getElementById('fragbox');
  box.innerHTML = '';
  ordenState.remaining.forEach(f => {
    const el = document.createElement('div');
    el.className = 'frag';
    el.textContent = f.text;
    el.onclick = () => placeFrag(f);
    box.appendChild(el);
  });
  const line = document.getElementById('answerline');
  line.innerHTML = '';
  ordenState.placed.forEach(f => {
    const el = document.createElement('span');
    el.className = 'frag2';
    el.textContent = f.text;
    line.appendChild(el);
  });
}

function placeFrag(f){
  if(answered) return;
  ordenState.placed.push(f);
  ordenState.remaining = ordenState.remaining.filter(x => x.idx !== f.idx);
  renderFragBox();
}

function checkOrden(){
  if(answered) return;
  if(ordenState.remaining.length > 0){ return; } // aun faltan fragmentos
  answered = true;
  const ch = CHALLENGES[current];
  const placedIdx = ordenState.placed.map(f => f.idx);
  const isCorrect = JSON.stringify(placedIdx) === JSON.stringify(ch.data.orden_correcto);
  const line = document.getElementById('answerline');
  line.style.borderColor = isCorrect ? 'var(--verde)' : 'var(--coral)';
  if(isCorrect) score++;
  document.getElementById('explain').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('checkBtn').disabled = true;
}

function selectOption(idx, correctIdx){
  if(answered) return;
  answered = true;
  const opts = document.querySelectorAll('.opt');
  opts.forEach((b, i) => {
    b.disabled = true;
    if(i === correctIdx) b.classList.add('correct');
    else if(i === idx) b.classList.add('wrong');
  });
  if(idx === correctIdx) score++;
  document.getElementById('explain').classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
}

function next(){
  if(current < CHALLENGES.length-1){
    current++;
    render();
  } else {
    showResult();
  }
}

function showResult(){
  document.getElementById('card').style.display = 'none';
  document.getElementById('levelbar').innerHTML = '';
  const result = document.getElementById('result');
  result.classList.add('show');
  document.getElementById('scoreText').textContent = score + ' / ' + CHALLENGES.length;
  let msg = '';
  if(score === CHALLENGES.length) msg = '¡Perfecto! Ya sabes redactar un reglamento claro, breve y bien construido.';
  else if(score >= CHALLENGES.length*0.6) msg = 'Muy bien — revisa con tu equipo los que fallaste antes de escribir el reglamento final.';
  else msg = 'Buen intento — repasa con tu maestro los verbos y la concisión antes del reglamento final.';
  document.getElementById('resultMsg').textContent = msg;
}

function start(){
  current = 0; score = 0;
  render();
}

start();
</script>
</body></html>
