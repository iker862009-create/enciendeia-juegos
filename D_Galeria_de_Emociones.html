<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Galería de Emociones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800&display=swap');
  :root{
    --turquesa:#00B4D8; --turquesa-dark:#0088A8; --dorado:#F4A100; --dorado-dark:#C97F00;
    --crema:#FFF8EC; --navy:#1B3A5C; --verde:#3FBF7F; --coral:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:
      radial-gradient(circle at 15% 20%, rgba(244,161,0,0.13), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(0,180,216,0.15), transparent 45%),
      var(--crema);
    font-family:'Nunito',sans-serif;color:var(--navy);display:flex;flex-direction:column;align-items:center;padding:20px 12px 40px;}
  header{text-align:center;margin-bottom:10px;}
  .eyebrow{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dorado-dark);margin:0 0 4px;}
  h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(18px,5vw,25px);margin:0 0 6px;color:var(--navy);}
  .stats{display:flex;gap:16px;margin:10px 0 16px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;color:var(--turquesa-dark);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:420px;width:100%;}
  .card{aspect-ratio:3/4;position:relative;cursor:pointer;perspective:600px;}
  .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s;}
  .card.flipped .card-inner, .card.matched .card-inner{transform:rotateY(180deg);}
  .face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;text-align:center;padding:4px;}
  .front{background:linear-gradient(145deg,var(--turquesa),var(--turquesa-dark));box-shadow:0 3px 0 var(--turquesa-dark);}
  .front::after{content:'😊';font-size:22px;opacity:.85;}
  .back{background:#fff;border:2.5px solid var(--dorado);transform:rotateY(180deg);font-family:'Baloo 2',sans-serif;font-weight:800;font-size:clamp(10px,3vw,13px);color:var(--navy);flex-direction:column;gap:4px;}
  .back .emoji{font-size:clamp(22px,7vw,32px);}
  .card.matched .back{background:#F1FBF6;border-color:var(--verde);color:#1c6b45;}
  .msg{margin-top:18px;text-align:center;display:none;}
  .msg.show{display:block;animation:rise .4s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .msg h2{font-family:'Baloo 2',sans-serif;color:var(--dorado-dark);font-size:22px;margin-bottom:4px;}
  .btn{margin-top:10px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:14px;background:linear-gradient(145deg,var(--turquesa),var(--turquesa-dark));color:#fff;border:none;border-radius:999px;padding:10px 24px;cursor:pointer;box-shadow:0 4px 0 var(--turquesa-dark);}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--turquesa-dark);}
  footer{margin-top:22px;text-align:center;font-size:11px;color:#9AA7B3;font-weight:700;}
  footer b{color:var(--turquesa-dark);}
</style></head>
<body>
<div class="wrap" style="max-width:460px;width:100%;">
  <header>
    <p class="eyebrow">2° Primaria · Proyecto D</p>
    <h1>😊 Galería de Emociones</h1>
  </header>
  <div class="stats">
    <span>Intentos: <span id="tries">0</span></span>
    <span>Pares: <span id="pairs">0</span>/6</span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="msg" id="msg">
    <h2>🏆 ¡Encontraste todos los pares!</h2>
    <p id="msgText"></p>
    <button class="btn" onclick="start()">Jugar de nuevo</button>
  </div>
  <footer>2026-2027 · <b>EnciendeIA</b> · Planeación 2° Primaria</footer>
</div>
<script>
const ITEMS = [{"key": "feliz", "emoji": "😄", "label": "Feliz"}, {"key": "triste", "emoji": "😢", "label": "Triste"}, {"key": "enojado", "emoji": "😠", "label": "Enojado"}, {"key": "sorprendido", "emoji": "😮", "label": "Sorprendido"}, {"key": "miedo", "emoji": "😨", "label": "Con miedo"}, {"key": "tranquilo", "emoji": "😌", "label": "Tranquilo"}];

let flipped = [], matchedCount = 0, tries = 0, lock = false;

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function start(){
  matchedCount = 0; tries = 0; flipped = []; lock = false;
  document.getElementById('tries').textContent = 0;
  document.getElementById('pairs').textContent = 0;
  document.getElementById('msg').classList.remove('show');
  const deck = shuffle([...ITEMS, ...ITEMS].map((item, i) => ({...item, uid:i})));
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  deck.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = item.key;
    card.innerHTML = `<div class="card-inner">
      <div class="face front"></div>
      <div class="face back"><span class="emoji">${item.emoji}</span><span>${item.label}</span></div>
    </div>`;
    card.onclick = () => flip(card);
    grid.appendChild(card);
  });
}

function flip(card){
  if(lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if(flipped.length === 2){
    tries++;
    document.getElementById('tries').textContent = tries;
    lock = true;
    const [a,b] = flipped;
    if(a.dataset.key === b.dataset.key){
      setTimeout(() => {
        a.classList.add('matched'); b.classList.add('matched');
        matchedCount++;
        document.getElementById('pairs').textContent = matchedCount;
        flipped = []; lock = false;
        if(matchedCount === ITEMS.length) showEnd();
      }, 400);
    } else {
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = []; lock = false;
      }, 800);
    }
  }
}

function showEnd(){
  const msg = document.getElementById('msg');
  msg.classList.add('show');
  let text = '';
  if(tries <= 6*1.5) text = '¡Excelente memoria!';
  else if(tries <= 6*2.5) text = 'Muy bien — sigue practicando.';
  else text = 'Buen intento — juega de nuevo para mejorar.';
  document.getElementById('msgText').textContent = text;
}

start();
</script>
</body></html>
